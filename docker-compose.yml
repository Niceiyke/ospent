services:
  ospent-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ospent-frontend
    restart: unless-stopped
    networks:
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ospent-fe.rule=Host(`ospent-dev.wordlyte.com`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.ospent-fe.entrypoints=websecure"
      - "traefik.http.routers.ospent-fe.tls.certresolver=myresolver"
      - "traefik.http.services.ospent-fe.loadbalancer.server.port=80"

  ospent-backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: ospent-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    networks:
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ospent-be.rule=Host(`ospent-dev.wordlyte.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.ospent-be.entrypoints=websecure"
      - "traefik.http.routers.ospent-be.tls.certresolver=myresolver"
      - "traefik.http.routers.ospent-be.priority=100"
      - "traefik.http.services.ospent-be.loadbalancer.server.port=3001"

networks:
  edge:
    external: true

volumes:
  ospent-db:
